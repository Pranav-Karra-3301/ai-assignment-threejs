<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Dice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 55%, #d4eaf7 75%, #f0f8ff 100%);
      width: 100vw;
      height: 100vh;
    }
    canvas { display: block; }
    #toggleBtn {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: white;
      color: black;
      border: 2px solid black;
      padding: 8px 22px;
      font-size: 15px;
      font-family: Arial, Helvetica, sans-serif;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    #toggleBtn:hover {
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <button id="toggleBtn">Stop Dice</button>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.173.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Constants ──
    const GRAVITY = -15;
    const GROUND_Y = -2.2;
    const BOUNCE_FACTOR = 0.6;
    const DICE_SIZE = 1.2;
    const HALF_DICE = DICE_SIZE / 2;
    const SNOW_DOT_COUNT = 250;
    const SNOW_FLAKE_COUNT = 80;

    // ── State ──
    let velocityY = 0;
    let velocityX = 0.3;
    let angularVel = { x: 0.015, y: 0.025, z: 0.01 };
    let isStopped = false;
    let isDragging = false;
    let prevMouse = new THREE.Vector2();

    // ── Renderer ──
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ── Scene & Camera ──
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.5, 8);
    camera.lookAt(0, 0, 0);

    // ── Lighting ──
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // ── Dice Face Textures ──
    function createFaceTexture(pipCount) {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // White background with subtle rounded rect
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);

      // Slightly off-white border effect
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 4;
      ctx.strokeRect(6, 6, size - 12, size - 12);

      // Pip positions
      const c = size / 2;       // center
      const o = size * 0.28;    // offset from center
      const r = size * 0.085;   // pip radius

      const positions = {
        1: [[c, c]],
        2: [[c + o, c - o], [c - o, c + o]],
        3: [[c + o, c - o], [c, c], [c - o, c + o]],
        4: [[c - o, c - o], [c + o, c - o], [c - o, c + o], [c + o, c + o]],
        5: [[c - o, c - o], [c + o, c - o], [c, c], [c - o, c + o], [c + o, c + o]],
        6: [[c - o, c - o], [c + o, c - o], [c - o, c], [c + o, c], [c - o, c + o], [c + o, c + o]]
      };

      ctx.fillStyle = '#1a1a1a';
      for (const [px, py] of positions[pipCount]) {
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // Standard die: opposite faces sum to 7
    // Three.js BoxGeometry face order: +X, -X, +Y, -Y, +Z, -Z
    // Map: +X=3, -X=4, +Y=1, -Y=6, +Z=2, -Z=5
    const faceValues = [3, 4, 1, 6, 2, 5];
    const materials = faceValues.map(v =>
      new THREE.MeshStandardMaterial({ map: createFaceTexture(v) })
    );

    const diceGeometry = new THREE.BoxGeometry(DICE_SIZE, DICE_SIZE, DICE_SIZE);
    const dice = new THREE.Mesh(diceGeometry, materials);
    dice.position.set(-1.5, 2, 0);
    dice.rotation.set(0.4, 0.6, 0.2);
    scene.add(dice);

    // ── Snowflake Dot Particles ──
    function createSnowDots() {
      const geo = new THREE.BufferGeometry();
      const positions = new Float32Array(SNOW_DOT_COUNT * 3);
      const speeds = new Float32Array(SNOW_DOT_COUNT);
      const swayOffsets = new Float32Array(SNOW_DOT_COUNT);

      for (let i = 0; i < SNOW_DOT_COUNT; i++) {
        positions[i * 3]     = (Math.random() - 0.5) * 24;
        positions[i * 3 + 1] = Math.random() * 16 - 4;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 8 - 1;
        speeds[i] = Math.random() * 0.008 + 0.004;
        swayOffsets[i] = Math.random() * Math.PI * 2;
      }

      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const mat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.06,
        transparent: true,
        opacity: 0.7,
        sizeAttenuation: true,
        depthWrite: false,
      });

      const points = new THREE.Points(geo, mat);
      scene.add(points);
      return { geo, positions, speeds, swayOffsets };
    }

    // ── Snowflake Symbol Particles ──
    function createSnowflakeTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 64, 64);
      ctx.fillStyle = 'white';
      ctx.font = '48px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u2744', 32, 34);
      return new THREE.CanvasTexture(canvas);
    }

    function createSnowFlakes() {
      const geo = new THREE.BufferGeometry();
      const positions = new Float32Array(SNOW_FLAKE_COUNT * 3);
      const speeds = new Float32Array(SNOW_FLAKE_COUNT);
      const swayOffsets = new Float32Array(SNOW_FLAKE_COUNT);

      for (let i = 0; i < SNOW_FLAKE_COUNT; i++) {
        positions[i * 3]     = (Math.random() - 0.5) * 24;
        positions[i * 3 + 1] = Math.random() * 16 - 4;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 8 - 1;
        speeds[i] = Math.random() * 0.006 + 0.003;
        swayOffsets[i] = Math.random() * Math.PI * 2;
      }

      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const mat = new THREE.PointsMaterial({
        map: createSnowflakeTexture(),
        color: 0xffffff,
        size: 0.35,
        transparent: true,
        opacity: 0.85,
        sizeAttenuation: true,
        depthWrite: false,
        alphaTest: 0.1,
      });

      const points = new THREE.Points(geo, mat);
      scene.add(points);
      return { geo, positions, speeds, swayOffsets };
    }

    const snowDots = createSnowDots();
    const snowFlakes = createSnowFlakes();

    function updateSnow(data, count, time) {
      const pos = data.positions;
      for (let i = 0; i < count; i++) {
        pos[i * 3 + 1] -= data.speeds[i];
        pos[i * 3] += Math.sin(time * 0.0008 + data.swayOffsets[i]) * 0.003;

        if (pos[i * 3 + 1] < -5) {
          pos[i * 3 + 1] = 10 + Math.random() * 4;
          pos[i * 3] = (Math.random() - 0.5) * 24;
        }
      }
      data.geo.attributes.position.needsUpdate = true;
    }

    // ── Drag Interaction ──
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const dragPlane = new THREE.Plane();
    const intersection = new THREE.Vector3();
    const offset = new THREE.Vector3();

    function onPointerDown(e) {
      if (e.target !== renderer.domElement) return;

      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(dice);

      if (hits.length > 0) {
        isDragging = true;
        renderer.domElement.style.cursor = 'grabbing';

        // Drag plane facing camera through dice
        const camDir = new THREE.Vector3();
        camera.getWorldDirection(camDir);
        dragPlane.setFromNormalAndCoplanarPoint(camDir, dice.position);

        raycaster.ray.intersectPlane(dragPlane, intersection);
        offset.copy(dice.position).sub(intersection);

        prevMouse.set(e.clientX, e.clientY);
      }
    }

    function onPointerMove(e) {
      if (!isDragging) {
        // Hover cursor
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(dice);
        renderer.domElement.style.cursor = hits.length > 0 ? 'grab' : 'default';
        return;
      }

      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      raycaster.ray.intersectPlane(dragPlane, intersection);
      dice.position.copy(intersection.add(offset));

      prevMouse.set(e.clientX, e.clientY);
    }

    function onPointerUp() {
      if (isDragging) {
        isDragging = false;
        renderer.domElement.style.cursor = 'default';
        velocityY = 0;
        velocityX = (Math.random() - 0.5) * 0.5;
      }
    }

    window.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);

    // ── Stop/Start Button ──
    const btn = document.getElementById('toggleBtn');
    btn.addEventListener('click', () => {
      isStopped = !isStopped;
      btn.textContent = isStopped ? 'Start Dice' : 'Stop Dice';
    });

    // ── Resize ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Animation Loop ──
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      const time = performance.now();

      // Dice physics
      if (!isStopped && !isDragging) {
        velocityY += GRAVITY * dt;
        dice.position.y += velocityY * dt;
        dice.position.x += velocityX * dt;

        // Horizontal bounds (bounce off sides)
        const xBound = 5;
        if (dice.position.x > xBound || dice.position.x < -xBound) {
          velocityX *= -1;
          dice.position.x = Math.max(-xBound, Math.min(xBound, dice.position.x));
        }

        // Floor collision
        if (dice.position.y <= GROUND_Y + HALF_DICE) {
          dice.position.y = GROUND_Y + HALF_DICE;
          velocityY = -velocityY * BOUNCE_FACTOR;

          // Perpetual bounce
          if (Math.abs(velocityY) < 1.5) {
            velocityY = 6 + Math.random() * 2;
          }

          // Randomize angular velocity on bounce
          angularVel.x = (Math.random() - 0.5) * 0.06;
          angularVel.y = (Math.random() - 0.5) * 0.06;
          angularVel.z = (Math.random() - 0.5) * 0.04;
        }

        // Rotation
        dice.rotation.x += angularVel.x;
        dice.rotation.y += angularVel.y;
        dice.rotation.z += angularVel.z;
      }

      // Snow
      updateSnow(snowDots, SNOW_DOT_COUNT, time);
      updateSnow(snowFlakes, SNOW_FLAKE_COUNT, time);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
